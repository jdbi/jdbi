---
name: Documentation build

on:
  push:
    branches:
      - master
      - jdbi4-dev
  pull_request:
    branches:
      - master
      - jdbi4-dev

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  doc:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - uses: actions/setup-java@v5
        name: setup build jdk
        id: build_jdk
        with:
          java-version: 25
          distribution: temurin
          cache: maven

      - name: docs
        env:
          MAVEN_ARGS: "-B -ff -Dbasepom.check.fail-javadoc=true"
        run: |
          make docs

      - uses: actions/upload-artifact@v7
        name: upload build logs
        continue-on-error: true
        # A failed javadoc aggregate exits with a bare "exit code 2"; the fatal line is
        # buried in the console among dozens of benign warnings, and GitHub's annotation
        # cap hides it. Keep the full build output so the real cause is recoverable
        # without re-running the job.
        if: ${{ always() }}
        with:
          name: build logs (${{ github.job }})
          retention-days: 90
          path: |
            **/target
            !**/target/**/*.jar
            !**/target/**/*.class

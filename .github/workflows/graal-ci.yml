---
name: CI Build in GraalVM native-image with tests

on:
  push:
    branches:
      - master
      - jdbi4-dev
  pull_request:
    branches:
      - master
      - jdbi4-dev

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  native-build:
    runs-on: ubuntu-latest
    name: GraalVM native build
    strategy:
      matrix:
        java-version: [ 25 ]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - uses: graalvm/setup-graalvm@v1
        name: setup build jdk
        id: build_jdk
        with:
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: build code
        id: install
        env:
          MAVEN_ARGS: "-B -ff -Djdbi.native=true"
        run: |
          ./mvnw --version
          make install

      - name: dump native test failures
        # A failing native run reports 2500+ passing lines and buries each failure's
        # actual cause (e.g. a MissingReflectionRegistrationError) a few hundred lines
        # above "BUILD FAILURE", so the job log ends on a bare Maven error. Re-print the
        # error/failure entries from the native-image test reports at the end of the log
        # so the real cause is the last thing shown, without downloading an artifact.
        if: ${{ failure() && steps.install.conclusion == 'failure' }}
        run: |
          echo "::group::native test failures"
          find . -path '*/target/native-test-reports/*.xml' -print0 \
            | xargs -0 -r python3 .github/print-native-test-failures.py
          echo "::endgroup::"

      - uses: actions/upload-artifact@v7
        name: upload build logs
        id: upload_build_logs
        continue-on-error: true
        if: ${{ always() }}
        with:
          name: build logs (${{ github.job }}, ${{ matrix.java-version }})
          retention-days: 90
          path: |
            **/target
            !**/target/**/*.jar
            !**/target/**/*.class

      - uses: actions/upload-artifact@v7
        name: upload build artifacts
        id: upload_build_artifacts
        continue-on-error: true
        with:
          name: build artifacts (${{ github.job }}, ${{ matrix.java-version }})
          retention-days: 1
          path: |
            **/target/native-tests
            **/target/native-test-reports/*
